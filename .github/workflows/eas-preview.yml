name: Nexus Android Preview

on:
  workflow_dispatch:
  push:
    tags:
      - "v2.1.*"

permissions:
  contents: read

concurrency:
  group: nexus-android-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Start preview APK build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verification
        run: pnpm run verify

      - name: Run release check
        run: pnpm run release:check

      - name: Validate EAS token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is not configured in GitHub Actions secrets." >&2
            exit 1
          fi

      - name: Start EAS preview APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          pnpm dlx eas-cli@latest build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait \
            --json | tee eas-build.json

          echo "### APK Preview sent to EAS" >> "$GITHUB_STEP_SUMMARY"
          echo "The build is continuing on Expo servers." >> "$GITHUB_STEP_SUMMARY"

      - name: Save EAS build metadata
        uses: actions/upload-artifact@v4
        with:
          name: nexus-eas-build-metadata
          path: eas-build.json
          retention-days: 14
