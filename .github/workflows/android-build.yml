name: Nexus Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - release

permissions:
  contents: read

concurrency:
  group: nexus-android-${{ inputs.profile }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify native release
        run: pnpm run verify && pnpm run release:check && pnpm exec expo install --check

      - name: Validate EAS token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: test -n "$EXPO_TOKEN" || (echo "EXPO_TOKEN is not configured." >&2; exit 1)

      - name: Start EAS APK build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_PROFILE: ${{ inputs.profile }}
        run: |
          pnpm dlx eas-cli@20.5.1 build \
            --platform android \
            --profile "$BUILD_PROFILE" \
            --non-interactive \
            --no-wait \
            --json | tee eas-build.json
          echo "APK build submitted to EAS with profile $BUILD_PROFILE." >> "$GITHUB_STEP_SUMMARY"

      - name: Save EAS build metadata
        uses: actions/upload-artifact@v4
        with:
          name: nexus-eas-build-metadata-${{ inputs.profile }}
          path: eas-build.json
          retention-days: 14
