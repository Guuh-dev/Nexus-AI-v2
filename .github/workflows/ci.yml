name: Nexus CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:

concurrency:
  group: nexus-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run verification
        run: pnpm run verify

      - name: Run release check
        run: pnpm run release:check

      - name: Validate Expo configuration
        run: pnpm exec expo config --type public --json > /tmp/nexus-expo-config.json

      - name: Export web
        run: pnpm run export:web

      - name: Check Expo dependencies
        run: pnpm exec expo install --check
