name: Nexus CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: nexus-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run release:check
      - run: npm run export:web
