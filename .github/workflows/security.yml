name: Nexus Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run security:secrets
      - run: npm test -- tests/api.test.ts tests/api-config.test.ts tests/untrusted-data.test.ts tests/storage.test.ts

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
