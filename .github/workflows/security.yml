name: Nexus Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate

      - name: Scan secrets
        run: pnpm run security:secrets

      - name: Run security regression tests
        run: pnpm exec vitest run tests/api.test.ts tests/assistant-api-security.test.ts tests/api-config.test.ts tests/untrusted-data.test.ts tests/storage.test.ts tests/native-widget-security.test.ts tests/workflow-security.test.ts

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v3
