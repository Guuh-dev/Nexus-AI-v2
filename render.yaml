services:
  - type: web
    name: nexus-ai-v2-1
    runtime: node
    plan: free
    buildCommand: npx -y pnpm@10.0.0 install --frozen-lockfile && npx -y pnpm@10.0.0 run export:web
    startCommand: npx -y pnpm@10.0.0 run serve:web -- --port $PORT
    healthCheckPath: /api/status
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: OPENROUTER_API_KEY
        sync: false
