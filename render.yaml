services:
  - type: web
    name: nexus-ai-v2-1
    runtime: node
    plan: free
    buildCommand: npm ci && npm run export:web
    startCommand: npx expo serve --port $PORT
    healthCheckPath: /api/status
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_ALLOW_PAID_FALLBACK
        value: "false"
